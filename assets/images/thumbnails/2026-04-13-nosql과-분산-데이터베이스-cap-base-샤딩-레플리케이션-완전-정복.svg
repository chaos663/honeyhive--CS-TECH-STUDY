      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="50%" stop-color="#15803D"/>
      <stop offset="100%" stop-color="#16A34A"/>
    </linearGradient>
    <radialGradient id="blob1Grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#86EFAC" stop-opacity="0.4"/>
