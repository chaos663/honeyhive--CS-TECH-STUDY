    <text x="600" y="311" font-family="'Pretendard', 'Apple SD Gothic Neo', sans-serif" font-size="48" font-weight="800" fill="#FFFFFF" text-anchor="middle" letter-spacing="-0.5">NoSQL과 분산 데이터베이스 — CAP,</text>
