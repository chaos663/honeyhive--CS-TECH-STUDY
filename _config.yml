title: HoneyByte
description: 한 바이트씩 쌓는 CS 지식
url: "https://blog.honeybarrel.co.kr"
baseurl: ""

plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Build settings
markdown: kramdown
permalink: /:year/:month/:day/:title/
timezone: Asia/Seoul
future: true

# Feed
feed:
  path: feed.xml

# Collections
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post

# Exclude
exclude:
  - README.md
  - LICENSE
